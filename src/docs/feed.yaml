paths:
  /api/feed:
    get:
      tags: [Feed]
      summary: Lista todas as publicações do feed
      security:
        - bearerAuth: []
      responses:
        200:
          description: Sucesso

    post:
      tags: [Feed]
      summary: Cria uma nova publicação no feed
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_user, tipo]
              properties:
                id_user:
                  type: integer
                  example: 1
                id_tarefa:
                  type: integer
                  example: 3
                id_subtask:
                  type: integer
                  example: 2
                id_desafio:
                  type: integer
                  example: 1
                tipo:
                  type: string
                  enum:
                    - TAREFA_EM_PROGRESSO
                    - TAREFA_CONCLUIDA
                    - SUBTAREFA_CONCLUIDA
                    - TAREFA_PARTILHADA
                    - DESAFIO_CONCLUIDO
                    - BADGE_RECEBIDO
                comentario:
                  type: string
                  example: Concluí esta tarefa hoje!
                quer_participantes:
                  type: boolean
                  example: false
                badge:
                  type: string
                  example: Leitor da Semana
      responses:
        201:
          description: Publicação criada
        400:
          description: Dados inválidos

  /api/feed/{id}:
    get:
      tags: [Feed]
      summary: Obtém uma publicação do feed por ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da publicação
      responses:
        200:
          description: Sucesso
        404:
          description: Publicação não encontrada

    delete:
      tags: [Feed]
      summary: Remove uma publicação do feed
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da publicação
      responses:
        204:
          description: Publicação removida
        404:
          description: Publicação não encontrada

  /api/feed/{id}/like:
    post:
      tags: [Feed]
      summary: Adiciona like a uma publicação
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da publicação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_user]
              properties:
                id_user:
                  type: integer
                  example: 1
      responses:
        201:
          description: Like adicionado
        400:
          description: Dados inválidos

    delete:
      tags: [Feed]
      summary: Remove like de uma publicação
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da publicação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_user]
              properties:
                id_user:
                  type: integer
                  example: 1
      responses:
        204:
          description: Like removido
        404:
          description: Like não encontrado

  /api/feed/{id}/comments:
    get:
      tags: [Feed]
      summary: Lista comentários de uma publicação
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da publicação
      responses:
        200:
          description: Sucesso

    post:
      tags: [Feed]
      summary: Adiciona comentário a uma publicação
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da publicação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_user, comentario]
              properties:
                id_user:
                  type: integer
                  example: 1
                comentario:
                  type: string
                  example: Boa! Também quero participar.
      responses:
        201:
          description: Comentário criado
        400:
          description: Dados inválidos

  /api/feed/comments/{commentId}:
    delete:
      tags: [Feed]
      summary: Remove um comentário do feed
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: commentId
          required: true
          schema:
            type: integer
          description: ID do comentário
      responses:
        204:
          description: Comentário removido
        404:
          description: Comentário não encontrado