paths:
  /api/tasks/{id}/suggest-subtasks:
    post:
      tags:
        - Tasks AI
      summary: Sugere subtarefas para uma tarefa usando LLM
      description: Recebe o ID de uma tarefa existente, gera subtarefas com LLM e guarda-as na base de dados.
      parameters:
        - name: id
          in: path
          required: true
          description: ID da tarefa
          schema:
            type: integer
            example: 13
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                mode:
                  type: string
                  example: mock
                  description: Modo da LLM. Pode ser mock ou api.
      responses:
        201:
          description: Subtarefas geradas e guardadas com sucesso
        400:
          description: ID da tarefa inválido
        500:
          description: Erro ao gerar e guardar subtarefas