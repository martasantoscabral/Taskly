paths:
  /api/groups:
    post:
      tags: [Groups]
      summary: Cria um novo grupo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome]
              properties:
                nome:
                  type: string
                  minLength: 3
                  example: Equipa Backend
      responses:
        200:
          description: Grupo criado com sucesso
        400:
          description: Dados inválidos
        401:
          description: Não autenticado

    delete:
      tags: [Groups]
      summary: Remove um grupo
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: grupo_id
          required: true
          schema:
            type: integer
          description: ID do grupo
      responses:
        200:
          description: Grupo removido
        404:
          description: Grupo não encontrado
        401:
          description: Não autenticado

  /api/groups/user:
    post:
      tags: [Groups]
      summary: Adiciona um utilizador a um grupo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gr_id, ut_id, classe]
              properties:
                gr_id:
                  type: integer
                  example: 1

                ut_id:
                  type: integer
                  example: 3

                classe:
                  type: string
                  enum: [MEMBRO, LIDER]
                  example: MEMBRO

      responses:
        200:
          description: Utilizador adicionado ao grupo
        400:
          description: Dados inválidos
        401:
          description: Não autenticado

    get:
      tags: [Groups]
      summary: Lista os utilizadores de um grupo
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: grupo_id
          required: true
          schema:
            type: integer
          description: ID do grupo

      responses:
        200:
          description: Lista de utilizadores do grupo
        400:
          description: ID inválido
        401:
          description: Não autenticado

    delete:
      tags: [Groups]
      summary: Remove um utilizador de um grupo
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: gr_id
          required: true
          schema:
            type: integer
          description: ID do grupo

        - in: query
          name: ut_id
          required: true
          schema:
            type: integer
          description: ID do utilizador

      responses:
        200:
          description: Utilizador removido do grupo
        404:
          description: Utilizador não encontrado no grupo
        401:
          description: Não autenticado