paths:
  /api/notifications:
    get:
      tags: [Notifications]
      summary: Retorna a lista de notificações do utilizador autenticado
      security:
        - bearerAuth: []
      responses:
        200:
          description: Sucesso
        401:
          description: Não autenticado
        500:
          description: Erro ao listar notificações

    post:
      tags: [Notifications]
      summary: Cria uma nova notificação
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tipo, mensagem]
              properties:
                tipo:
                  type: string
                  minLength: 2
                  example: info
                mensagem:
                  type: string
                  minLength: 3
                  example: Tarefa atualizada com sucesso
      responses:
        201:
          description: Notificação criada
        400:
          description: Dados inválidos
        401:
          description: Não autenticado

  /api/notifications/{id}:
    get:
      tags: [Notifications]
      summary: Retorna uma notificação do utilizador autenticado pelo ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da notificação
      responses:
        200:
          description: Sucesso
        400:
          description: ID inválido
        401:
          description: Não autenticado
        404:
          description: Notificação não encontrada

    delete:
      tags: [Notifications]
      summary: Remove uma notificação existente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da notificação
      responses:
        204:
          description: Notificação removida
        400:
          description: ID inválido
        401:
          description: Não autenticado
        404:
          description: Notificação não encontrada

  /api/notifications/{id}/read:
    put:
      tags: [Notifications]
      summary: Marca uma notificação como lida
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da notificação
      responses:
        200:
          description: Notificação marcada como lida
        400:
          description: ID inválido
        401:
          description: Não autenticado
        404:
          description: Notificação não encontrada

  /api/notifications/read-all:
    put:
      tags: [Notifications]
      summary: Marca todas as notificações do utilizador autenticado como lidas
      security:
        - bearerAuth: []
      responses:
        200:
          description: Todas as notificações foram marcadas como lidas
        401:
          description: Não autenticado
        500:
          description: Erro ao marcar notificações como lidas